<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ใบสั่งซื้อสินค้า | THE SCENERY VINTAGE FARM</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#f0f1f3;font-family:Segoe UI,Tahoma,sans-serif;color:#222}
.page{max-width:1800px;margin:32px auto;background:#fff;padding:32px;border-radius:16px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#2f2f2f;color:#fff;padding:8px}
td{padding:6px;border-bottom:1px solid #e5e7eb}

input,textarea{width:100%;padding:6px;border:1px solid #ccc;border-radius:6px}

.img-box{
  width:130px;height:130px;
  border:2px dashed #94a3b8;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
  position:relative;background:#fff;
}
.img-box img{width:100%;height:100%;object-fit:cover}

.img-overlay{
  position:absolute;
  bottom:4px;left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  color:#fff;font-size:10px;
  padding:2px 8px;border-radius:6px;
}

.btn{padding:6px 12px;border:none;border-radius:8px;cursor:pointer}
</style>
</head>

<body>

<div class="page">

<input type="month" id="monthPicker">
<input type="text" id="deptInput" placeholder="แผนก">

<table>
<thead>
<tr>
<th>#</th><th>รายละเอียด</th><th>รูป</th>
<th>ซื้อ</th><th>ราคา</th><th>รวม</th><th>ลบ</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="addRow()">+ เพิ่ม</button>

<h3>รวม: <span id="grand">0</span></h3>

</div>

<script>
let db;
const req=indexedDB.open('PO_IMG',1);

req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore('img',{keyPath:'id'});
};

req.onsuccess=e=>db=e.target.result;

const tbody=document.getElementById('tbody');
const monthPicker=document.getElementById('monthPicker');
const deptInput=document.getElementById('deptInput');

monthPicker.onchange=loadMonth;
deptInput.oninput=saveMonth;

function addRow(d={}){
  const id=d.id||crypto.randomUUID();

  const tr=document.createElement('tr');
  tr.dataset.id=id;

  tr.innerHTML=`
  <td class="no"></td>
  <td><textarea>${d.desc||''}</textarea></td>
  <td>
    <div class="img-box">
      <span>แนบรูป</span>
      <input type="file" hidden>
    </div>
  </td>
  <td><input class="buy" type="number" value="${d.buy||0}"></td>
  <td><input class="price" type="number" value="${d.price||0}"></td>
  <td class="sum">0</td>
  <td><button onclick="del(this)">ลบ</button></td>
  `;

  tbody.appendChild(tr);
  bind(tr);

  // โหลดรูป
  const tx=db.transaction('img','readonly')
    .objectStore('img').get(id);

  tx.onsuccess=e=>{
    if(e.target.result){
      setImg(tr,id,e.target.result.data);
    }
  };

  renumber(); calc(); saveMonth();
}

function setImg(tr,id,src){
  const box=tr.querySelector('.img-box');
  box.innerHTML=`
    <img src="${src}">
    <input type="file" hidden>
    <div class="img-overlay">เปลี่ยนรูป</div>
  `;
  bind(tr);
}

function bind(tr){
  const box=tr.querySelector('.img-box');
  const file=box.querySelector('input');
  const id=tr.dataset.id;

  box.onclick=()=>file.click();

  file.onchange=()=>{
    const f=file.files[0];
    if(!f) return;

    const r=new FileReader();
    r.onload=()=>{
      const src=r.result;

      db.transaction('img','readwrite')
        .objectStore('img')
        .put({id,data:src});

      setImg(tr,id,src);
      saveMonth();
    };
    r.readAsDataURL(f);
  };

  tr.querySelectorAll('input,textarea').forEach(el=>{
    el.oninput=()=>{
      calc();
      saveMonth();
    };
  });
}

function del(btn){
  btn.closest('tr').remove();
  renumber(); calc(); saveMonth();
}

function calc(){
  let g=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const q=+tr.querySelector('.buy').value||0;
    const p=+tr.querySelector('.price').value||0;
    const s=q*p;
    tr.querySelector('.sum').innerText=s.toFixed(2);
    g+=s;
  });
  grand.innerText=g.toFixed(2);
}

function renumber(){
  let i=1;
  tbody.querySelectorAll('.no').forEach(n=>n.innerText=i++);
}

function saveMonth(){
  if(!monthPicker.value) return;

  const data=[];
  tbody.querySelectorAll('tr').forEach(tr=>{
    data.push({
      id:tr.dataset.id,
      desc:tr.children[1].querySelector('textarea').value,
      buy:tr.querySelector('.buy').value,
      price:tr.querySelector('.price').value
    });
  });

  localStorage.setItem('PO_'+monthPicker.value,JSON.stringify({
    dept:deptInput.value,
    rows:data
  }));
}

function loadMonth(){
  tbody.innerHTML='';
  const raw=localStorage.getItem('PO_'+monthPicker.value);
  if(!raw){addRow();return;}

  const d=JSON.parse(raw);
  deptInput.value=d.dept||'';
  d.rows.forEach(r=>addRow(r));
}

addRow();
</script>

</body>
</html>
