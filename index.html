<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ใบสั่งซื้อสินค้า</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#f0f1f3;font-family:sans-serif}
.page{max-width:1600px;margin:20px auto;background:#fff;padding:20px;border-radius:12px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#333;color:#fff;padding:6px}
td{padding:6px;border-bottom:1px solid #ddd}

input,textarea{width:100%;font-size:12px}

.img-box{
  width:120px;height:120px;border:2px dashed #aaa;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;position:relative
}
.img-box img{width:100%;height:100%;object-fit:cover}
.img-overlay{
  position:absolute;bottom:4px;left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.6);color:#fff;
  font-size:10px;padding:2px 6px;border-radius:6px
}
</style>
</head>

<body>

<div class="page">

<input type="month" id="monthPicker">
<input type="text" id="deptInput" placeholder="แผนก">

<table>
<thead>
<tr>
<th>#</th><th>รายละเอียด</th><th>รูป</th>
<th>ซื้อ</th><th>ราคา</th><th>รวม</th><th>ลบ</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="addRow()">+ เพิ่ม</button>
<button onclick="openCopy()">คัดลอกเดือนก่อน</button>

<h3>รวม: <span id="grand">0</span></h3>

</div>

<script>
const tbody=document.getElementById('tbody');
const monthInput=document.getElementById('monthPicker');
const deptInput=document.getElementById('deptInput');

monthInput.onchange=loadMonth;
deptInput.oninput=saveMonth;

function addRow(d={}){
  const tr=document.createElement('tr');

  tr.innerHTML=`
  <td class="no"></td>
  <td><textarea>${d.desc||''}</textarea></td>
  <td>
    <div class="img-box">
      ${d.img?`<img src="${d.img}"><div class="img-overlay">เปลี่ยน</div>`:'แนบรูป'}
      <input type="file" hidden>
    </div>
  </td>
  <td><input class="buy" type="number" value="${d.buy||0}"></td>
  <td><input class="price" type="number" value="${d.price||0}"></td>
  <td class="sum">0</td>
  <td><button onclick="del(this)">ลบ</button></td>
  `;

  tbody.appendChild(tr);
  bind(tr);
  renumber();
  calc();
  saveMonth();
}

function bind(tr){
  const box=tr.querySelector('.img-box');
  const file=box.querySelector('input');

  box.onclick=()=>file.click();

  file.onchange=()=>{
    const r=new FileReader();
    r.onload=()=>{
      box.innerHTML=`
        <img src="${r.result}">
        <input type="file" hidden>
        <div class="img-overlay">เปลี่ยน</div>
      `;
      bind(tr);
      saveMonth();
    };
    r.readAsDataURL(file.files[0]);
  };

  tr.querySelectorAll('input,textarea').forEach(el=>{
    el.oninput=()=>{
      calc();
      saveMonth();
    };
  });
}

function del(btn){
  btn.closest('tr').remove();
  renumber();
  calc();
  saveMonth();
}

function calc(){
  let g=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const q=+tr.querySelector('.buy').value||0;
    const p=+tr.querySelector('.price').value||0;
    const s=q*p;
    tr.querySelector('.sum').innerText=s.toFixed(2);
    g+=s;
  });
  grand.innerText=g.toFixed(2);
}

function renumber(){
  let i=1;
  tbody.querySelectorAll('.no').forEach(n=>n.innerText=i++);
}

function saveMonth(){
  if(!monthInput.value) return;
  const data=[];
  tbody.querySelectorAll('tr').forEach(tr=>{
    data.push({
      desc:tr.children[1].querySelector('textarea').value,
      img:tr.querySelector('img')?.src||'',
      buy:tr.querySelector('.buy').value,
      price:tr.querySelector('.price').value
    });
  });
  localStorage.setItem('PO_'+monthInput.value,JSON.stringify({
    dept:deptInput.value,
    rows:data
  }));
}

function loadMonth(){
  tbody.innerHTML='';
  const raw=localStorage.getItem('PO_'+monthInput.value);
  if(!raw){addRow();return;}
  const d=JSON.parse(raw);
  deptInput.value=d.dept||'';
  d.rows.forEach(r=>addRow(r));
}

function openCopy(){
  const d=new Date(monthInput.value+'-01');
  d.setMonth(d.getMonth()-1);
  const key='PO_'+d.toISOString().slice(0,7);

  const old=localStorage.getItem(key);
  if(!old) return alert('ไม่มีข้อมูลเดือนก่อน');

  localStorage.setItem('PO_'+monthInput.value,old);
  loadMonth();
}

addRow();
</script>

</body>
</html>
