<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ใบสั่งซื้อสินค้า</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#f0f1f3;font-family:sans-serif}
.page{max-width:1600px;margin:20px auto;background:#fff;padding:20px;border-radius:12px}
table{width:100%;border-collapse:collapse}
th{background:#333;color:#fff;padding:6px}
td{padding:6px;border-bottom:1px solid #ddd}
input,textarea{width:100%}
.img-box{width:100px;height:100px;border:1px dashed #aaa;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-box img{width:100%;height:100%;object-fit:cover}
.btn{padding:6px 12px;margin:5px;cursor:pointer}
</style>
</head>

<body>
<div class="page">

เดือน <input type="month" id="monthPicker">
แผนก <input id="deptInput">

<button class="btn" onclick="addRow()">+ เพิ่ม</button>
<button class="btn" onclick="exportData()">💾 เซฟ</button>
<button class="btn" onclick="importData()">📂 กู้</button>
<input type="file" id="importFile" hidden>

<table>
<thead>
<tr>
<th>#</th><th>รายการ</th><th>รูป</th><th>ซื้อ</th><th>ราคา</th><th>รวม</th><th>ลบ</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

รวม: <span id="grand">0</span>

</div>

<script>
let db;
const req=indexedDB.open('imgDB',1);
req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore('img',{keyPath:'id'});
};
req.onsuccess=e=>db=e.target.result;

const tbody=document.getElementById('tbody');
const monthPicker=document.getElementById('monthPicker');
const deptInput=document.getElementById('deptInput');

function addRow(d={}){
  const id=d.id||crypto.randomUUID();

  const tr=document.createElement('tr');
  tr.dataset.id=id;

  tr.innerHTML=`
  <td class="no"></td>
  <td><input value="${d.desc||''}"></td>
  <td><div class="img-box"><input type="file" hidden></div></td>
  <td><input type="number" class="buy" value="${d.buy||0}"></td>
  <td><input type="number" class="price" value="${d.price||0}"></td>
  <td class="sum">0</td>
  <td><button onclick="delRow(this)">🗑</button></td>
  `;

  tbody.appendChild(tr);

  bindRow(tr);
  renumber();
  calcAll();
}

function bindRow(tr){
  const id=tr.dataset.id;
  const box=tr.querySelector('.img-box');
  const input=box.querySelector('input');

  box.onclick=()=>input.click();

  input.onchange=()=>{
    const f=input.files[0];
    if(!f)return;

    const r=new FileReader();
    r.onload=()=>{
      db.transaction('img','readwrite').objectStore('img').put({id,data:r.result});

      let img=box.querySelector('img');
      if(!img){
        img=document.createElement('img');
        box.innerHTML='';
        box.appendChild(img);
        box.appendChild(input);
      }
      img.src=r.result;
    };
    r.readAsDataURL(f);
  };

  db.transaction('img','readonly').objectStore('img').get(id).onsuccess=e=>{
    if(e.target.result){
      let img=document.createElement('img');
      img.src=e.target.result.data;
      box.innerHTML='';
      box.appendChild(img);
      box.appendChild(input);
    }
  };

  tr.querySelectorAll('input').forEach(i=>{
    i.oninput=()=>{
      calcAll();
      saveMonth();
    }
  });
}

function delRow(btn){
  btn.closest('tr').remove();
  renumber();
  calcAll();
  saveMonth();
}

function renumber(){
  let i=1;
  document.querySelectorAll('.no').forEach(n=>n.innerText=i++);
}

function calcAll(){
  let g=0;
  document.querySelectorAll('.buy').forEach(b=>{
    const tr=b.closest('tr');
    const s=b.value*tr.querySelector('.price').value||0;
    tr.querySelector('.sum').innerText=s;
    g+=+s;
  });
  grand.innerText=g;
}

/* SAVE */
function saveMonth(){
  if(!monthPicker.value)return;

  const rows=[];
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    rows.push({
      id:tr.dataset.id,
      desc:tr.children[1].querySelector('input').value,
      buy:tr.children[3].querySelector('input').value,
      price:tr.children[4].querySelector('input').value
    });
  });

  localStorage.setItem('PO_'+monthPicker.value,JSON.stringify({
    dept:deptInput.value,
    rows
  }));
}

/* LOAD */
function loadMonth(){
  tbody.innerHTML='';
  const d=JSON.parse(localStorage.getItem('PO_'+monthPicker.value)||'{}');
  deptInput.value=d.dept||'';
  (d.rows||[]).forEach(addRow);
}

monthPicker.onchange=loadMonth;

/* EXPORT */
function exportData(){
  const data=localStorage.getItem('PO_'+monthPicker.value);
  if(!data)return alert('ไม่มีข้อมูล');

  const blob=new Blob([data]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='data.json';
  a.click();
}

/* IMPORT */
function importData(){
  importFile.click();
}

importFile.onchange=e=>{
  const f=e.target.files[0];
  const r=new FileReader();
  r.onload=()=>{
    localStorage.setItem('PO_'+monthPicker.value,r.result);
    loadMonth();
  };
  r.readAsText(f);
};
</script>

</body>
</html>
