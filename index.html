<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ใบสั่งซื้อสินค้า | THE SCENERY VINTAGE FARM</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#f0f1f3;font-family:Segoe UI,Tahoma,sans-serif;color:#222}
.page{max-width:1800px;margin:32px auto;background:#fff;padding:32px 36px;border-radius:16px}

.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #d6d9de;padding-bottom:16px}
.header-left h1{margin:0;font-size:28px}
.header-left h2{margin:4px 0 0;font-size:16px;color:#666}
.header-right{display:flex;gap:20px}

label{font-size:12px;font-weight:600;color:#555}
input,textarea{
  width:100%;
  padding:6px 8px;
  border:1px solid #d1d5db;
  border-radius:8px;
  font-size:12px
}
textarea{resize:vertical}

.card{margin-top:24px;background:#fafafa;padding:20px;border-radius:16px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#2f2f2f;color:#fff;padding:8px}
td{padding:6px;border-bottom:1px solid #e5e7eb;vertical-align:top}

.btn{padding:8px 18px;border-radius:12px;font-weight:600;border:none;cursor:pointer}
.btn.add{background:#e6e8ec}
.btn-del{background:#fee2e2;border:none;border-radius:8px;padding:4px 8px;cursor:pointer}

.actions{margin-top:20px;display:flex;justify-content:flex-end;align-items:center;gap:16px}

/* รูป */
.img-box{
  width:130px;
  height:130px;
  border:2px dashed #94a3b8;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
  background:#fff;
  position:relative;
}
.img-box img{width:100%;height:100%;object-fit:cover}
.img-hint{font-size:11px;color:#64748b;text-align:center}

/* overlay เปลี่ยนรูป */
.img-overlay{
  position:absolute;
  bottom:4px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  color:#fff;
  font-size:10px;
  padding:2px 8px;
  border-radius:6px;
}

/* แถวล่าง */
.sub-row td{background:#f9fafb}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:#fff;padding:24px;border-radius:16px;width:340px;text-align:center}
.modal-actions{display:flex;justify-content:center;gap:12px;margin-top:16px}
.modal .danger{background:#dc2626;color:#fff}
.modal .ghost{background:#e5e7eb}

@media print{
  button,.btn-del{display:none!important}
}
</style>
</head>

<body>

<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>ใบสั่งซื้อสินค้า</h1>
      <h2>THE SCENERY VINTAGE FARM</h2>
    </div>
    <div class="header-right">
      <div>
        <label>เดือน</label>
        <input type="month" id="monthPicker">
      </div>
      <div>
        <label>แผนก</label>
        <input type="text" id="deptInput">
      </div>
    </div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>รายละเอียด</th>
          <th>รูป</th>
          <th>หน่วย</th>
          <th>สต็อก</th>
          <th>คงเหลือ</th>
          <th>ซื้อเพิ่ม</th>
          <th>ราคา</th>
          <th>รวม</th>
          <th>ร้าน</th>
          <th>ลบ</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <button class="btn add" onclick="addRow()">+ เพิ่มรายการ</button>
  </div>

  <div class="actions">
    <strong>รวม <span id="grand">0.00</span> บาท</strong>
    <button class="btn" onclick="window.print()">🖨 พิมพ์</button>
  </div>
</div>

<script>
const monthInput=document.getElementById('monthPicker');
const deptInput=document.getElementById('deptInput');
const tbody=document.getElementById('tbody');

function addRow(d={}){
  const main=document.createElement('tr');
  const sub=document.createElement('tr');
  sub.className='sub-row';

  main.innerHTML=`
    <td class="no"></td>
    <td><textarea>${d.desc||''}</textarea></td>
    <td>
      <div class="img-box">
        ${d.img?`<img src="${d.img}"><div class="img-overlay">เปลี่ยนรูป</div>`:'<span class="img-hint">แนบรูป</span>'}
        <input type="file" hidden>
      </div>
    </td>
    <td><input value="${d.unit||''}"></td>
    <td><input type="number" value="${d.stock||''}"></td>
    <td><input value="${d.remain||''}"></td>
    <td><input type="number" class="buy" value="${d.buy||0}"></td>
    <td><input type="number" class="price" value="${d.price||0}"></td>
    <td class="sum">0.00</td>
    <td><input value="${d.vendor||''}"></td>
    <td><button class="btn-del" onclick="deleteRow(this)">🗑</button></td>
  `;

  sub.innerHTML=`
    <td colspan="11">
      <div class="sub-grid">
        <textarea placeholder="จุดประสงค์">${d.purpose||''}</textarea>
        <textarea placeholder="สถานที่">${d.location||''}</textarea>
      </div>
    </td>
  `;

  tbody.appendChild(main);
  tbody.appendChild(sub);

  bindRow(main,sub);
  renumber();
  calcAll();
}

function bindRow(main,sub){
  const box=main.querySelector('.img-box');
  const file=box.querySelector('input');

  box.onclick=()=>file.click();

  file.onchange=()=>{
    const r=new FileReader();
    r.onload=()=>{
      box.innerHTML=`
        <img src="${r.result}">
        <input type="file" hidden>
        <div class="img-overlay">เปลี่ยนรูป</div>
      `;
      bindRow(main,sub);
    };
    r.readAsDataURL(file.files[0]);
  };

  main.querySelectorAll('input,textarea').forEach(el=>{
    el.oninput=calcAll;
  });
}

function deleteRow(btn){
  const row=btn.closest('tr');
  const sub=row.nextSibling;
  row.remove();
  sub.remove();
  renumber();
  calcAll();
}

function calcAll(){
  let g=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const buy=tr.querySelector('.buy');
    if(!buy) return;

    const q=+buy.value||0;
    const p=+tr.querySelector('.price').value||0;
    const s=q*p;

    tr.querySelector('.sum').innerText=s.toFixed(2);
    g+=s;
  });
  grand.innerText=g.toFixed(2);
}

function renumber(){
  let i=1;
  tbody.querySelectorAll('.no').forEach(n=>n.innerText=i++);
}

addRow();
</script>

</body>
</html>
